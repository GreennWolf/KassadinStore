<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Metadatos básicos -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon -->
    <link rel="shortcut icon" href="/assets/icon.webp" type="image/webp">
    <link rel="apple-touch-icon" href="/assets/icon.webp">
    
    <!-- Título y metadescripción -->
    <title>Kassadin Store | Tienda de Skins League of Legends LAS/LAN</title>
    <meta name="description" content="Tienda oficial de skins de League of Legends. Servicio seguro y confiable para LAS y LAN. RP Seguro, Chromas, Pases de Batalla y más con los mejores precios." />
    
    <!-- Keywords -->
    <meta name="keywords" content="Kassadin Store, KSD Store, League of Legends, LoL skins, comprar skins LoL, RP seguro, LAS, LAN, pase de batalla, chromas, tienda LoL" />
    
    <!-- Open Graph para redes sociales -->
    <meta property="og:site_name" content="Kassadin Store" />
    <meta property="og:title" content="Kassadin Store | Tu tienda de Skins de League of Legends" />
    <meta property="og:description" content="Tu tienda de confianza para comprar skins y RP en League of Legends. Servicio 24/7, precios increíbles y atención personalizada." />
    <meta property="og:url" content="https://ksdinstore.com" />
    <meta property="og:image" content="https://api.ksdinstore.com/logo" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kassadin Store | Tienda LoL" />
    <meta name="twitter:description" content="Compra skins y RP de League of Legends al mejor precio. ¡Servicio seguro y rápido!" />
    <meta name="twitter:image" content="https://api.ksdinstore.com/logo" />
    
    <!-- Metadatos adicionales -->
    <meta name="author" content="Kassadin Store" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://ksdinstore.com" />
    
    <!-- Información estructurada para Google -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "OnlineStore",
        "name": "Kassadin Store",
        "description": "Tienda oficial de skins y RP para League of Legends en LAS y LAN",
        "url": "https://ksdinstore.com",
        "image": "https://api.ksdinstore.com/logo",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressRegion": "Latinoamérica",
          "addressCountry": "AR"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://ksdinstore.com/store?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

  <body>
    <div id="root"></div>
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
